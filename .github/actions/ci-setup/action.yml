name: Setup CI

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version-file: ".node-version"
        cache: yarn

    - name: Install dependencies
      shell: bash
      run: yarn install --frozen-lockfile
