name: Changesets - Comment PR Changeset
description: Comment the changeset status in PRs
runs:
  using: node24
  main: dist/comment-pr-changeset.js
inputs:
  github-token:
    description: The GitHub token to use for authentication. Defaults to the GitHub-provided token.
    required: false
    default: ${{ github.token }}
outputs:
  commentId:
    description: The comment id created or updated by this action.
  commentBody:
    description: The comment body created or updated by this action.
branding:
  icon: package
  color: blue
